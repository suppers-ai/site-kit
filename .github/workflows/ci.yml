name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build.sh
        run: ./build.sh

      - name: Verify dist/ matches src/
        # If the diff is non-empty the contributor forgot to re-run
        # build.sh after editing src/. The order-of-concatenation
        # assertion inside build.sh has already passed by this point.
        run: git diff --exit-code dist/
